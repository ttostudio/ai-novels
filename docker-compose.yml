services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novels
      POSTGRES_PASSWORD: novels_password
      POSTGRES_DB: novels
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novels"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed_from_json.py"
    environment:
      DATABASE_URL: postgresql://novels:novels_password@postgres:5432/novels
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://novels:novels_password@postgres:5432/novels
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      COMFYUI_URL: ${COMFYUI_URL:-http://localhost:8188}
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=http://ai-novels:3600
      - NEXT_PUBLIC_API_BASE_URL=http://ai-novels:3600/api
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    ports:
      - "3600:3600"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - frontend
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
