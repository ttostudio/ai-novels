<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a"/>
      <stop offset="100%" style="stop-color:#1a0f2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book shape -->
  <g transform="translate(256,240)">
    <!-- Left page -->
    <path d="M-20,-100 Q-120,-95 -140,-20 L-140,80 Q-120,5 -20,0 Z" fill="url(#glow)" opacity="0.9"/>
    <!-- Right page -->
    <path d="M20,-100 Q120,-95 140,-20 L140,80 Q120,5 20,0 Z" fill="url(#glow)" opacity="0.7"/>
    <!-- Spine -->
    <rect x="-20" y="-100" width="40" height="180" rx="4" fill="#7c3aed" opacity="0.5"/>
    <!-- Text lines on left page -->
    <line x1="-110" y1="-60" x2="-40" y2="-60" stroke="#e9d5ff" stroke-width="3" opacity="0.6"/>
    <line x1="-110" y1="-40" x2="-50" y2="-40" stroke="#e9d5ff" stroke-width="3" opacity="0.4"/>
    <line x1="-110" y1="-20" x2="-45" y2="-20" stroke="#e9d5ff" stroke-width="3" opacity="0.3"/>
    <!-- Text lines on right page -->
    <line x1="40" y1="-60" x2="110" y2="-60" stroke="#e9d5ff" stroke-width="3" opacity="0.6"/>
    <line x1="40" y1="-40" x2="100" y2="-40" stroke="#e9d5ff" stroke-width="3" opacity="0.4"/>
    <line x1="40" y1="-20" x2="105" y2="-20" stroke="#e9d5ff" stroke-width="3" opacity="0.3"/>
  </g>
  <!-- Sparkle/magic pen -->
  <g transform="translate(340,140) rotate(-30)">
    <rect x="-6" y="-60" width="12" height="80" rx="3" fill="url(#pen)"/>
    <polygon points="0,24 -8,20 8,20" fill="#f9a8d4"/>
  </g>
  <!-- Sparkles -->
  <circle cx="360" cy="100" r="4" fill="#f472b6" opacity="0.8"/>
  <circle cx="380" cy="130" r="3" fill="#a855f7" opacity="0.6"/>
  <circle cx="330" cy="110" r="2.5" fill="#6366f1" opacity="0.7"/>
  <!-- AI text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="48" fill="#a855f7" opacity="0.8">AI NOVELS</text>
</svg>
